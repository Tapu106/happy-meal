name: Build & Deploy (Go Lambda)

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.meta.outputs.stage }}
      gh_env: ${{ steps.meta.outputs.gh_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set stage + GitHub environment from branch
        id: meta
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "dev" ]; then
            echo "stage=dev" >> "$GITHUB_OUTPUT"
            echo "gh_env=dev" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "main" ]; then
            echo "stage=prod" >> "$GITHUB_OUTPUT"
            echo "gh_env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build bootstrap (arm64, provided.al2023)
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o bootstrap ./cmd/lambda

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap
          path: bootstrap
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    # ✅ This selects GitHub Environment dynamically: dev or prod
    environment: ${{ needs.build.outputs.gh_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bootstrap artifact
        uses: actions/download-artifact@v4
        with:
          name: bootstrap
          path: .

      # ✅ AWS_ROLE_ARN should be stored as an Environment Secret (dev/prod different)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node (for Serverless)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Create .env file for this stage
        shell: bash
        run: |
          ENV_FILE=".env.${{ needs.build.outputs.stage }}"
          echo "OPENSEARCH_URL=${{ secrets.OPENSEARCH_URL }}" > "$ENV_FILE"
          echo "OPENSEARCH_USERNAME=${{ secrets.OPENSEARCH_USERNAME }}" >> "$ENV_FILE"
          echo "OPENSEARCH_PASSWORD=${{ secrets.OPENSEARCH_PASSWORD }}" >> "$ENV_FILE"
          echo "STAGE=${{ needs.build.outputs.stage }}" >> "$ENV_FILE"

      # ✅ Deploy using stage derived from branch
      - name: Deploy via Serverless
        run: npx sls deploy --stage ${{ needs.build.outputs.stage }} --region ${{ env.AWS_REGION }}
